# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages
on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Pinned so a future change to the runner's default Node
          # version can't silently break this build. Match whatever
          # `node -v` prints on your own machine, or bump this when you
          # deliberately upgrade Node.
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        # npm ci (not npm install): installs exactly what's pinned in
        # package-lock.json instead of re-resolving semver ranges against
        # the live registry. Reproducible, and fails loudly instead of
        # silently pulling in a newer — possibly breaking — dependency
        # release you never asked for.
        run: npm ci
      - name: Build app
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Just the build output, not the whole repo
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
